services:
  - type: web
    name: ticketing-backend
    env: python
    plan: free
    buildCommand: "bash build.sh"
    startCommand: "gunicorn ticketingBackEnd.wsgi:application"
    healthCheckPath: "/api/ticketing/health/"
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.3
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "false"
      - key: WEB_CONCURRENCY
        value: "2"
      - key: ALLOWED_HOSTS
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: CSRF_TRUSTED_ORIGINS
        sync: false
      - key: DATABASE_URL
        sync: false
